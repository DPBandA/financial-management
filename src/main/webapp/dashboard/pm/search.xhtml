<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:p="http://primefaces.org/ui"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"   
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">

    <p:panel id="jobSearchPanel" header="Search">

        <div class="field">
            <h:outputText value="Type" style="margin-right: 5px;font-weight: bold;" />
            <p:selectOneMenu value="#{purchasingManager.searchType}"
                             title="Select the search type">

                <f:selectItems value="#{purchasingManager.searchTypes}" />

            </p:selectOneMenu>
        </div>

        <div class="field">
            <h:outputText value="Date" style="margin-right: 5px;font-weight: bold;" />
            <p:selectOneMenu value="#{purchasingManager.dateSearchPeriod.dateField}" 
                             id="prDateField"
                             title="Select the date field on which to search" >
                <f:selectItems value="#{purchasingManager.purchReqDateSearchFields}" />

            </p:selectOneMenu>
        </div>

        <div class="field">
            <h:outputText value="Period" style="margin-right: 5px;font-weight: bold;"/>               
            <p:selectOneMenu value= "#{purchasingManager.dateSearchPeriod.name}"
                             id="prDatePeriod"
                             title="Select the date period">

                <p:ajax listener="#{purchasingManager.dateSearchPeriod.initDatePeriod}"
                        global="false"
                        update="prStartSearchDate,prEndSearchDate"
                        process="@this" />

                <f:selectItems value="#{purchasingManager.datePeriods}"/>

            </p:selectOneMenu>
        </div>

        <div class="field">
            <h:outputText value="Start" style="margin-right: 5px;font-weight: bold;" />
            <p:calendar value="#{purchasingManager.dateSearchPeriod.startDate}"  
                        id="prStartSearchDate"
                        title="Select or enter the start of the date period"
                        size="17"
                        navigator="true"
                        autocomplete="off"
                        validator="requiredFieldValidator"
                        disabled="#{purchasingManager.dateSearchPeriod.startDateDisabled}"
                        pattern="MMM dd, yyyy" />
        </div>

        <div class="field">
            <h:outputText value="End" style="margin-right: 5px;font-weight: bold;" />
            <p:calendar value="#{purchasingManager.dateSearchPeriod.endDate}"
                        id="prEndSearchDate"
                        title="Select or enter the end of the date period"
                        size="17"
                        navigator="true"
                        validator="requiredFieldValidator"
                        disabled="#{purchasingManager.dateSearchPeriod.endDateDisabled}"
                        pattern="MMM dd, yyyy" />
        </div>

        <div class="field">
            <p:inputText value="#{purchasingManager.searchText}"  
                         style="margin-right: 5px;width: 75%;"
                         placeholder="Enter search text"
                         id="purchaseReqSearchText" />
            <p:commandButton id="purchaseReqSearchButton"
                             class="search-button"   
                             actionListener="#{purchasingManager.doDefaultSearch}"
                             update=":mainTabViewForm:mainTabView"
                             icon="pi pi-search"
                             process="@form" />
        </div>

    </p:panel>

</html>
